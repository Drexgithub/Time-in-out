<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Clock</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <div class="brand">
    <h1>Time Clock</h1>
    <div class="clock" id="headerClock">--:--:--</div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tabClockBtn">Clock</button>
    <button class="tab-btn" id="tabHistoryBtn">History</button>
  </div>

  <div class="page active" id="pageClock">

    <div class="card">
      <label class="field-label" for="employeeSelect">Employee</label>
      <div class="employee-actions">
        <select id="employeeSelect"></select>
        <button class="btn btn-danger" id="deleteEmployeeBtn" disabled>Delete</button>
      </div>
      <div class="add-row">
        <input type="text" id="newEmployeeInput" placeholder="Add a new employee name">
        <button class="btn" id="addEmployeeBtn">Add</button>
      </div>
      <div class="error-msg" id="errorMsg" style="display:none;"></div>
    </div>

    <div class="card punch-card">
      <div class="employee-name" id="punchEmployeeName">—</div>
      <div class="status-line" id="punchStatus">Select an employee to begin</div>
      <div class="digital-time" id="liveClock">--:--:--</div>
      <button class="punch-btn punch-in" id="punchBtn" disabled>Punch in</button>
    </div>

    <div class="card">
      <div class="section-title">Who's in right now</div>
      <div id="board"><div class="empty">No employees yet</div></div>
    </div>

  </div>

  <div class="page" id="pageHistory">

    <div class="card">
      <label class="field-label" for="historyEmployeeSelect">Employee</label>
      <select id="historyEmployeeSelect">
        <option value="__all__">All employees</option>
      </select>
    </div>

    <div class="card">
      <div class="history-toolbar">
        <div class="section-title">Weekly history</div>
        <button class="btn export-btn" id="exportPdfBtn">Export PDF</button>
      </div>
      <div class="week-nav">
        <button class="week-nav-btn" id="weekPrevBtn" aria-label="Previous week">&lsaquo;</button>
        <div>
          <div class="week-label" id="weekLabel">—</div>
          <div class="week-total" id="weekTotal"></div>
        </div>
        <button class="week-nav-btn" id="weekNextBtn" aria-label="Next week">&rsaquo;</button>
      </div>
      <div id="historyDays"></div>
      <div class="empty" id="historyEmptyMsg" style="display:none;">No punches this week</div>
    </div>

  </div>

</div>

<script src="supabase-config.js"></script>
<script src="script.js"></script>
</body>
</html>
